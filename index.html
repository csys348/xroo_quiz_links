<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>철길숲 기억 복원 | 퀴즈 허브</title>
  <meta name="description" content="철길숲 AR 체험 — 철로, 불꽃, 시간의 기억을 복원하는 퀴즈 미션" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-scene"></div>
  <div class="rail-tracks"><div class="rail-sleepers"></div></div>
  <div class="clock-decoration"></div>

  <div class="container">
    <header class="site-header">
      <div class="badge">Pohang Rail Forest</div>
      <h1>기억 복원 퀴즈</h1>

    </header>

    <nav class="progress-rail" aria-label="미션 진행">
      <div class="progress-stop"></div>
      <div class="progress-line"></div>
      <div class="progress-stop"></div>
      <div class="progress-line"></div>
      <div class="progress-stop"></div>
      <div class="progress-line"></div>
      <div class="progress-stop"></div>
      <div class="progress-line"></div>
      <div class="progress-stop"></div>
    </nav>

    <div id="mission-grid" class="mission-grid"></div>

    <p class="footer-note">각 미션은 개별 링크로 공유할 수 있습니다</p>
  </div>

  <script src="assets/js/missions.js"></script>
  <script src="assets/js/quiz-engine.js"></script>
